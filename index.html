<script>
// ═══════════════════════════════════════════════════════════════
// CIVIL+ v4.1 — 22 mars 2026 — version corrigée & renforcée
// ═══════════════════════════════════════════════════════════════

'use strict';

// ── constantes importantes ──
const _SB_REST_URL = 'https://xlkckemorgpjybqshits.supabase.co/rest/v1';
const _SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ta clé anon
const WHATSAPP_NUMBER = '237650000749';

const _PACK_DEFS = {
  1: { name:'Démarrage', max:1, icon:'📱', color:'#6C8AFF', bg:'rgba(108,138,255,.15)', border:'rgba(108,138,255,.4)' },
  2: { name:'Pro',        max:2, icon:'💼', color:'#0D9488', bg:'rgba(13,148,136,.15)', border:'rgba(13,148,136,.4)'  },
  5: { name:'Entreprise', max:5, icon:'🏢', color:'#F59F00', bg:'rgba(245,159,0,.15)',  border:'rgba(245,159,0,.4)'   },
};

// ── Sécurité : empreinte + hash ──
let _cachedFp = null;
function cpFingerprint() {
  if (_cachedFp) return _cachedFp;
  try {
    const parts = [
      screen.width||1920,
      screen.height||1080,
      screen.colorDepth||24,
      navigator.language||'fr',
      navigator.hardwareConcurrency||2,
      Intl.DateTimeFormat().resolvedOptions().timeZone||'UTC',
      navigator.platform||'Win32'
    ];
    const raw = parts.join('|');
    let h = 0x811c9dc5 >>> 0;
    for (let i = 0; i < raw.length; i++) {
      h ^= raw.charCodeAt(i);
      h = Math.imul(h, 0x01000193) >>> 0;
    }
    const A = 'ABCDEFGHJKMNPQRSTVWXYZ23456789';
    let out = '', n = h;
    for (let i = 0; i < 7; i++) { out = A[n % 30] + out; n = Math.floor(n / 30); }
    _cachedFp = out;
    return out;
  } catch(e) {
    return 'BTPDEF1';
  }
}

// ── Génération / validation code licence ──
const _SECRET_SEED = new Uint8Array([67,80,50,48,50,52,88]); // "CP2024X"
function _cpDeriveSecret() {
  let h = 0x811c9dc5 >>> 0;
  for (let r = 0; r < 3; r++) {
    for (let i = 0; i < _SECRET_SEED.length; i++) {
      h ^= _SECRET_SEED[i];
      h = Math.imul(h, 0x01000193) >>> 0;
    }
  }
  const A = 'ABCDEFGHJKMNPQRSTVWXYZ23456789';
  let out = '', n = h;
  for (let i = 0; i < 5; i++) { out = A[n % 30] + out; n = Math.floor(n / 30); }
  return out;
}

const _PACK_CHARS = {1:'P',2:'Q',5:'R'};
const _CHAR_TO_PACK = {'P':1,'Q':2,'R':5};

function cpMakeCode(fp, packMax) {
  const secret = _cpDeriveSecret();
  const str = secret + fp + secret;
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  const A = 'ABCDEFGHJKMNPQRSTVWXYZ23456789';
  let out = '', n = h;
  for (let i = 0; i < 7; i++) { out = A[n % 30] + out; n = Math.floor(n / 30); }
  return out + (_PACK_CHARS[packMax] || 'P');
}

function cpExtractPack(code) {
  if (!code || code.length < 8) return 1;
  const last = code.slice(-1).toUpperCase();
  return _CHAR_TO_PACK[last] || 1;
}

function cpCodeBase(code) {
  return code ? code.slice(0, -1) : '';
}

// ── ID Supabase ──
function _licenseToId(code) {
  return 'lic_' + _fnvHash(code.trim().toUpperCase()) + _fnvHash('BTPCIVIL_' + code.trim().toUpperCase());
}

function _fnvHash(str) {
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(36).toUpperCase().padStart(8,'0').slice(0,8);
}

// ── Blacklist locale (90 jours) ──
function _blacklistCode(code) {
  try {
    const bl = JSON.parse(localStorage.getItem('cp_bl3') || '{}');
    bl[_fnvHash(code.toUpperCase())] = Date.now() + 90*24*60*60*1000;
    localStorage.setItem('cp_bl3', JSON.stringify(bl));
  } catch {}
}

function _isBlacklisted(code) {
  try {
    const bl = JSON.parse(localStorage.getItem('cp_bl3') || '{}');
    const exp = bl[_fnvHash(code.toUpperCase())];
    if (exp && exp > Date.now()) return true;
    if (exp) delete bl[_fnvHash(code.toUpperCase())];
    localStorage.setItem('cp_bl3', JSON.stringify(bl));
  } catch {}
  return false;
}

// ── Vérification licence (cloud + local) ──
async function _checkLicenseUsage(code, fp, packMax) {
  if (_isBlacklisted(code)) {
    return { ok: false, msg: 'Clé refusée sur cet appareil (blacklist locale)' };
  }

  try {
    const licId = _licenseToId(code);
    const fpHash = _fnvHash(fp);

    const res = await fetch(`${_SB_REST_URL}/btp_licenses?id=eq.${licId}&select=id,used,fp_hash,pack_max&limit=1`, {
      method: 'GET',
      headers: { 'apikey': _SB_ANON_KEY, 'Authorization': `Bearer ${_SB_ANON_KEY}` }
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    if (!data || !data.length) {
      return { ok: false, msg: 'Clé non reconnue dans le système' };
    }

    const lic = data[0];

    // Empreinte différente ?
    if (lic.fp_hash && lic.fp_hash !== fpHash) {
      _blacklistCode(code);
      return { ok: false, msg: 'Clé liée à un autre appareil' };
    }

    if (lic.used) {
      _blacklistCode(code);
      return { ok: false, msg: 'Clé déjà utilisée' };
    }

    // Valide → marquer used
    await fetch(`${_SB_REST_URL}/btp_licenses?id=eq.${licId}`, {
      method: 'PATCH',
      headers: { 'apikey': _SB_ANON_KEY, 'Authorization': `Bearer ${_SB_ANON_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        used: true,
        used_at: new Date().toISOString(),
        used_fp_hash: fpHash
      })
    });

    localStorage.setItem('cp_pack_max', packMax);
    return { ok: true };
  } catch (e) {
    console.warn('[LicenseCheck]', e);
    // Fallback : si on a généré localement et pas encore synchronisé
    const localLic = cpGetLicenses().find(l => l.code === code && !l.used);
    if (localLic) {
      localStorage.setItem('cp_pending_verify', JSON.stringify({code, fp, packMax, ts: Date.now()}));
      return { ok: true };
    }
    return { ok: false, msg: 'Vérification impossible (connexion requise)' };
  }
}

// ── Flux principal de démarrage ──
window.addEventListener('load', () => {
  _cachedFp = cpFingerprint();
  document.getElementById('lockFpShort').textContent = _cachedFp;
  document.getElementById('lockFpShort2').textContent = _cachedFp;

  cpCheck(); // Lance la vérification licence + email
});

</script>
